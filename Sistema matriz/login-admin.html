<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrador - Sistema Matriz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .login-container h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #333;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            margin-top: 1rem;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .error {
            color: #dc3545;
            text-align: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔐 Login Administrador</h1>
        <div class="form-group">
            <label>Login</label>
            <input type="text" id="adminLogin" placeholder="Digite o login">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="adminSenha" placeholder="Digite a senha">
        </div>
        <button onclick="fazerLogin()">Entrar</button>
        <div id="errorMsg" class="error"></div>
    </div>

    <script>
        function fazerLogin() {
            const login = document.getElementById('adminLogin').value;
            const senha = document.getElementById('adminSenha').value;
            
            if (login === 'admin' && senha === '155145') {
                sessionStorage.setItem('admin_logado', JSON.stringify({
                    tipo: 'administrador',
                    login: login,
                    data_login: new Date().toISOString()
                }));
                
                window.location.href = 'painel-admin.html';
            } else {
                document.getElementById('errorMsg').textContent = 'Login ou senha incorretos!';
            }
        }
        
        const adminLogado = JSON.parse(sessionStorage.getItem('admin_logado') || 'null');
        if (adminLogado && adminLogado.tipo === 'administrador') {
            window.location.href = 'painel-admin.html';
        }
    </script>
</body>
</html>
