<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiro Acesso - Alterar Senha</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 480px;
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 { text-align: center; margin-bottom: 0.5rem; color: #333; }
        .subtitle { text-align: center; color: #666; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333; }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-group input:disabled {
            background-color: #f5f5f5;
            color: #666;
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .error { color: #dc3545; text-align: center; margin-top: 1rem; background: #f8d7da; padding: 10px; border-radius: 12px; display: none; }
        .success { color: #155724; text-align: center; margin-top: 1rem; background: #d4edda; padding: 10px; border-radius: 12px; display: none; }
        .info-empresa {
            background: linear-gradient(135deg, #e8f4fd, #d1ecf1);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            text-align: center;
            border-left: 4px solid #17a2b8;
        }
        .password-strength { margin-top: 8px; height: 4px; background: #e9ecef; border-radius: 4px; overflow: hidden; }
        .strength-bar { height: 100%; width: 0%; transition: width 0.3s; }
        .strength-text { font-size: 12px; margin-top: 5px; }
        .requirements {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 12px;
        }
        .requirements ul { margin-left: 20px; margin-top: 5px; }
        .requirements li { color: #666; list-style: none; margin: 5px 0; }
        .requirements li.valid { color: #28a745; }
        .requirements li.valid::before { content: "✓ "; }
        .requirements li.invalid::before { content: "✗ "; }
        .requirements li.invalid { color: #dc3545; }
        .pasta-info {
            background: #e8f4fd;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 12px;
            text-align: center;
            color: #0056b3;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            display: none;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .warning-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 13px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <h1>🔑 Primeiro Acesso</h1>
        <div class="subtitle">Cadastre uma nova senha para continuar</div>
        
        <div id="pastaDisplay" class="pasta-info"></div>
        <div id="infoEmpresa" class="info-empresa"></div>
        
        <div class="warning-box" id="warningBox">
            ⚠️ Após alterar sua senha, você será redirecionado para o login da sua empresa.
        </div>
        
        <div class="form-group">
            <label>Login Atual</label>
            <input type="text" id="loginAtual" readonly disabled>
        </div>
        
        <div class="form-group">
            <label>Novo Login</label>
            <input type="text" id="novoLogin" class="form-control" placeholder="Digite o novo login ou deixe em branco para manter" autocomplete="username">
        </div>
        
        <div class="form-group">
            <label>Nova Senha *</label>
            <input type="password" id="novaSenha" placeholder="Digite a nova senha" oninput="checkPasswordStrength()">
            <div class="password-strength"><div class="strength-bar" id="strengthBar"></div></div>
            <div class="strength-text" id="strengthText"></div>
        </div>
        
        <div class="form-group">
            <label>Confirmar Nova Senha *</label>
            <input type="password" id="confirmarSenha" placeholder="Confirme a nova senha" oninput="checkPasswordMatch()">
        </div>
        
        <div class="requirements" id="requirements">
            <strong>Requisitos da senha:</strong>
            <ul>
                <li id="reqLength" class="invalid">Mínimo 6 caracteres</li>
                <li id="reqCase" class="invalid">Letras maiúsculas e minúsculas</li>
                <li id="reqNumber" class="invalid">Pelo menos um número</li>
                <li id="reqSpecial" class="invalid">Pelo menos um caractere especial (!@#$%*)</li>
            </ul>
        </div>
        
        <button onclick="alterarSenha()" id="btnAlterar">ALTERAR SENHA</button>
        <div id="msg" class="error"></div>
        <div id="successMsg" class="success"></div>
    </div>

    <script>
        // ==================== RECUPERAR DADOS DA SESSIONSTORAGE ====================
        let empresaLogada = null;
        let pastaDaEmpresa = null;
        
        function carregarInfoEmpresa() {
            // Tenta pegar do sessionStorage (salvo pelo login.html)
            let empresa = sessionStorage.getItem('empresa_logada');
            
            if (empresa) {
                empresaLogada = JSON.parse(empresa);
                pastaDaEmpresa = empresaLogada.pasta;
                
                console.log('Empresa carregada do sessionStorage:', empresaLogada);
                console.log('Pasta da empresa:', pastaDaEmpresa);
                
                // Mostrar informações
                const pastaDisplay = document.getElementById('pastaDisplay');
                if (pastaDaEmpresa) {
                    pastaDisplay.innerHTML = `📁 Empresa: <strong>${pastaDaEmpresa}</strong>`;
                    pastaDisplay.style.background = '#d4edda';
                    pastaDisplay.style.color = '#155724';
                } else {
                    pastaDisplay.innerHTML = `⚠️ Pasta da empresa: <strong>Não identificada</strong>`;
                    pastaDisplay.style.background = '#f8d7da';
                    pastaDisplay.style.color = '#721c24';
                }
                
                document.getElementById('infoEmpresa').innerHTML = `
                    <strong>🏢 ${empresaLogada.nome || 'Empresa'}</strong><br>
                    Login: ${empresaLogada.login}<br>
                    <span style="color: #ff9800;">⚠️ Este é seu primeiro acesso. Cadastre uma nova senha.</span>
                `;
                document.getElementById('loginAtual').value = empresaLogada.login;
            } else {
                // Tenta buscar via URL (fallback)
                const urlParams = new URLSearchParams(window.location.search);
                const empresaId = urlParams.get('empresa_id');
                const login = urlParams.get('login');
                const token = urlParams.get('token');
                const pasta = urlParams.get('pasta');
                
                if (login && token === 'primeiro_acesso') {
                    // Buscar empresa na matriz de credenciais
                    const matrizCredenciais = JSON.parse(localStorage.getItem('matriz_empresas_credenciais') || '[]');
                    const credencial = matrizCredenciais.find(c => c.login === login && c.senha_provisoria === true);
                    
                    if (credencial) {
                        const empresas = JSON.parse(localStorage.getItem('matriz_empresas') || '[]');
                        const empresa = empresas.find(e => e.id === credencial.id_empresa);
                        
                        if (empresa) {
                            empresaLogada = {
                                id: empresa.id,
                                nome: empresa.nome,
                                login: credencial.login,
                                senha_provisoria: true,
                                pasta: pasta || empresa.pastaSistema
                            };
                            pastaDaEmpresa = pasta || empresa.pastaSistema;
                            sessionStorage.setItem('empresa_logada', JSON.stringify(empresaLogada));
                            
                            document.getElementById('infoEmpresa').innerHTML = `
                                <strong>🏢 ${empresa.nome}</strong><br>
                                Login: ${credencial.login}<br>
                                <span style="color: #ff9800;">⚠️ Este é seu primeiro acesso. Cadastre uma nova senha.</span>
                            `;
                            document.getElementById('loginAtual').value = credencial.login;
                            
                            if (pastaDaEmpresa) {
                                document.getElementById('pastaDisplay').innerHTML = `📁 Empresa: <strong>${pastaDaEmpresa}</strong>`;
                            }
                            return;
                        }
                    }
                }
                
                document.getElementById('msg').textContent = 'Dados da empresa não encontrados! Faça login novamente pela pasta da sua empresa.';
                document.getElementById('msg').style.display = 'block';
                document.getElementById('btnAlterar').disabled = true;
                return;
            }
        }
        
        // ==================== VALIDAÇÃO DE SENHA ====================
        function checkPasswordStrength() {
            const senha = document.getElementById('novaSenha').value;
            const hasMinLength = senha.length >= 6;
            const hasUpperCase = /[A-Z]/.test(senha);
            const hasLowerCase = /[a-z]/.test(senha);
            const hasNumber = /[0-9]/.test(senha);
            const hasSpecial = /[!@#$%*]/.test(senha);
            
            const reqLength = document.getElementById('reqLength');
            const reqCase = document.getElementById('reqCase');
            const reqNumber = document.getElementById('reqNumber');
            const reqSpecial = document.getElementById('reqSpecial');
            
            reqLength.className = hasMinLength ? 'valid' : 'invalid';
            reqCase.className = (hasUpperCase && hasLowerCase) ? 'valid' : 'invalid';
            reqNumber.className = hasNumber ? 'valid' : 'invalid';
            reqSpecial.className = hasSpecial ? 'valid' : 'invalid';
            
            let strength = 0;
            if (hasMinLength) strength += 25;
            if (hasUpperCase && hasLowerCase) strength += 25;
            if (hasNumber) strength += 25;
            if (hasSpecial) strength += 25;
            
            document.getElementById('strengthBar').style.width = strength + '%';
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            
            if (strength <= 25) { 
                bar.style.background = '#dc3545'; 
                text.textContent = 'Senha fraca';
            } else if (strength <= 50) { 
                bar.style.background = '#ffc107'; 
                text.textContent = 'Senha média';
            } else if (strength <= 75) { 
                bar.style.background = '#17a2b8'; 
                text.textContent = 'Senha boa';
            } else { 
                bar.style.background = '#28a745'; 
                text.textContent = 'Senha forte!';
            }
            
            checkPasswordMatch();
        }
        
        function checkPasswordMatch() {
            const senha = document.getElementById('novaSenha').value;
            const confirmar = document.getElementById('confirmarSenha').value;
            const confirmField = document.getElementById('confirmarSenha');
            if (confirmar && senha !== confirmar) {
                confirmField.style.borderColor = '#dc3545';
            } else if (confirmar && senha === confirmar) {
                confirmField.style.borderColor = '#28a745';
            } else {
                confirmField.style.borderColor = '#e9ecef';
            }
        }
        
        function validatePassword(senha) {
            return senha.length >= 6 && /[A-Z]/.test(senha) && /[a-z]/.test(senha) && 
                   /[0-9]/.test(senha) && /[!@#$%*]/.test(senha);
        }
        
        // ==================== ALTERAR SENHA ====================
        function alterarSenha() {
            const novoLogin = document.getElementById('novoLogin').value.trim();
            const novaSenha = document.getElementById('novaSenha').value;
            const confirmarSenha = document.getElementById('confirmarSenha').value;
            const msgEl = document.getElementById('msg');
            const successEl = document.getElementById('successMsg');
            const btn = document.getElementById('btnAlterar');
            const loading = document.getElementById('loadingOverlay');
            
            msgEl.style.display = 'none';
            successEl.style.display = 'none';
            
            if (!novaSenha || !confirmarSenha) {
                msgEl.textContent = 'Preencha todos os campos obrigatórios!';
                msgEl.style.display = 'block';
                return;
            }
            
            if (novaSenha !== confirmarSenha) {
                msgEl.textContent = 'As senhas não coincidem!';
                msgEl.style.display = 'block';
                return;
            }
            
            if (!validatePassword(novaSenha)) {
                msgEl.textContent = 'A senha não atende aos requisitos de segurança!';
                msgEl.style.display = 'block';
                return;
            }
            
            if (!empresaLogada) {
                msgEl.textContent = 'Dados da empresa não foram carregados. Refaça o login pela sua pasta.';
                msgEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'ALTERAR SENHA';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'PROCESSANDO...';
            loading.style.display = 'flex';
            
            setTimeout(() => {
                try {
                    let atualizado = false;
                    const empresaId = empresaLogada.id;
                    const loginAnterior = empresaLogada.login;
                    const loginFinal = novoLogin || loginAnterior;
                    const pastaEmpresa = pastaDaEmpresa;
                    
                    console.log('Atualizando credenciais para empresa:', empresaId);
                    console.log('Pasta da empresa:', pastaEmpresa);
                    
                    // Verificar se novo login já existe em outra empresa
                    const todasCredenciais = JSON.parse(localStorage.getItem('matriz_empresas_credenciais') || '[]');
                    let loginDuplicado = null;
                    if (loginFinal !== loginAnterior) {
                        loginDuplicado = todasCredenciais.find(c => c.login === loginFinal && c.id_empresa !== empresaId);
                    }
                    if (loginDuplicado) {
                        msgEl.textContent = 'Este login já está em uso. Escolha outro login.';
                        msgEl.style.display = 'block';
                        loading.style.display = 'none';
                        btn.disabled = false;
                        btn.textContent = 'ALTERAR SENHA';
                        return;
                    }
                    
                    // 1. Atualizar na pasta específica da empresa
                    if (pastaEmpresa) {
                        const key = `empresas_login_${pastaEmpresa}`;
                        let empresasPasta = JSON.parse(localStorage.getItem(key) || '[]');
                        const index = empresasPasta.findIndex(e => e.id === empresaId || e.login === loginAnterior);
                        
                        if (index !== -1) {
                            empresasPasta[index].login = loginFinal;
                            empresasPasta[index].senha = novaSenha;
                            empresasPasta[index].senha_provisoria = false;
                            localStorage.setItem(key, JSON.stringify(empresasPasta));
                            atualizado = true;
                            console.log(`✓ Credenciais atualizadas na pasta: ${pastaEmpresa}`);
                        } else {
                            empresasPasta.push({
                                id: empresaId,
                                nome: empresaLogada.nome,
                                login: loginFinal,
                                senha: novaSenha,
                                senha_provisoria: false,
                                pasta: pastaEmpresa,
                                data_cadastro: new Date().toISOString()
                            });
                            localStorage.setItem(key, JSON.stringify(empresasPasta));
                            atualizado = true;
                            console.log(`✓ Empresa criada na pasta: ${pastaEmpresa}`);
                        }
                    }
                    
                    // 2. Atualizar na matriz de credenciais globais
                    const credenciais = todasCredenciais;
                    const credIndex = credenciais.findIndex(c => c.id_empresa === empresaId || c.login === loginAnterior);
                    
                    if (credIndex !== -1) {
                        credenciais[credIndex].login = loginFinal;
                        credenciais[credIndex].senha = novaSenha;
                        credenciais[credIndex].senha_provisoria = false;
                        credenciais[credIndex].data_atualizacao = new Date().toISOString();
                        localStorage.setItem('matriz_empresas_credenciais', JSON.stringify(credenciais));
                        atualizado = true;
                        console.log('✓ Credenciais globais atualizadas');
                    } else {
                        credenciais.push({
                            id_empresa: empresaId,
                            login: loginFinal,
                            senha: novaSenha,
                            senha_provisoria: false,
                            data_criacao: new Date().toISOString()
                        });
                        localStorage.setItem('matriz_empresas_credenciais', JSON.stringify(credenciais));
                        atualizado = true;
                        console.log('✓ Credenciais globais criadas');
                    }
                    
                    // 3. Atualizar na lista de usuários autorizados
                    const usuariosApp = JSON.parse(localStorage.getItem('matriz_usuarios_app_autorizados') || '[]');
                    const userAppIndex = usuariosApp.findIndex(u => u.id === empresaId || u.login === loginAnterior);
                    
                    if (userAppIndex !== -1) {
                        usuariosApp[userAppIndex].login = loginFinal;
                        usuariosApp[userAppIndex].senha = novaSenha;
                        usuariosApp[userAppIndex].senha_provisoria = false;
                        usuariosApp[userAppIndex].status_acesso = 'autorizado';
                        localStorage.setItem('matriz_usuarios_app_autorizados', JSON.stringify(usuariosApp));
                        atualizado = true;
                        console.log('✓ Usuário app atualizado');
                    } else {
                        usuariosApp.push({
                            id: empresaId,
                            nome: empresaLogada.nome,
                            login: loginFinal,
                            cnpj: '',
                            pasta: pastaEmpresa,
                            status_acesso: 'autorizado',
                            senha_provisoria: false,
                            senha: novaSenha,
                            data_cadastro: new Date().toISOString(),
                            ultimo_acesso: new Date().toISOString()
                        });
                        localStorage.setItem('matriz_usuarios_app_autorizados', JSON.stringify(usuariosApp));
                        atualizado = true;
                        console.log('✓ Usuário app criado');
                    }
                    
                    // 4. Registrar alteração
                    const registros = JSON.parse(localStorage.getItem('matriz_registros_alteracoes') || '[]');
                    registros.unshift({
                        id: Date.now(),
                        empresa: empresaLogada.nome,
                        login: loginFinal,
                        pasta: pastaEmpresa,
                        acao: 'Login e senha alterados (primeiro acesso)',
                        data: new Date().toLocaleString(),
                        status: '✅ Login e senha atualizados com sucesso'
                    });
                    localStorage.setItem('matriz_registros_alteracoes', JSON.stringify(registros.slice(0, 500)));
                    
                    if (atualizado) {
                        successEl.textContent = '✅ Login e senha alterados com sucesso! Redirecionando para o login da empresa...';
                        successEl.style.display = 'block';
                        
                        // CORREÇÃO: Limpa sessionStorage e redireciona para o LOGIN da PASTA da EMPRESA
                        setTimeout(() => {
                            sessionStorage.removeItem('empresa_logada');
                            sessionStorage.removeItem('admin_logado');
                            
                            if (pastaEmpresa) {
                                // Volta para a pasta da empresa (que está no mesmo nível da pasta Sistema matriz)
                                // Exemplo: ../EMPRESA 1/login.html
                                window.location.href = `../${encodeURIComponent(pastaEmpresa)}/login.html?login=${encodeURIComponent(loginFinal)}`;
                            } else {
                                window.location.href = '../login.html';
                            }
                        }, 2000);
                    } else {
                        loading.style.display = 'none';
                        msgEl.textContent = 'Erro ao atualizar login e senha. Contate o administrador.';
                        msgEl.style.display = 'block';
                        btn.disabled = false;
                        btn.textContent = 'ALTERAR SENHA';
                    }
                } catch (error) {
                    console.error('Erro:', error);
                    loading.style.display = 'none';
                    msgEl.textContent = 'Erro ao processar: ' + error.message;
                    msgEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'ALTERAR SENHA';
                }
            }, 500);
        }
        
        // ==================== EVENTOS ====================
        document.addEventListener('DOMContentLoaded', function() {
            carregarInfoEmpresa();
            
            const novaSenhaInput = document.getElementById('novaSenha');
            const confirmarSenhaInput = document.getElementById('confirmarSenha');
            
            novaSenhaInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    confirmarSenhaInput.focus();
                }
            });
            
            confirmarSenhaInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    alterarSenha();
                }
            });
        });
    </script>
</body>
</html>
