<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
        }
        .login-container h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
        .alert {
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            text-align: center;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🎭 App de Eventos</h1>
        <div id="mensagem"></div>
        <form onsubmit="fazerLogin(event)">
            <div class="form-group">
                <label>CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" oninput="formatarCPF(this)">
            </div>
            <div class="form-group">
                <label>Nome</label>
                <input type="text" id="nome" placeholder="Seu nome completo">
            </div>
            <div class="form-group">
                <label>Tipo</label>
                <select id="tipo">
                    <option value="elenco">🎬 Elenco</option>
                    <option value="motorista">🚗 Motorista</option>
                </select>
            </div>
            <button type="submit">🔐 Entrar</button>
        </form>
    </div>
    
    <script>
        function formatarCPF(input) {
            let valor = input.value.replace(/\D/g, '');
            if (valor.length <= 11) {
                valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
                valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
                valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
                input.value = valor;
            }
        }
        
        function fazerLogin(event) {
            event.preventDefault();
            
            const cpf = document.getElementById('cpf').value.replace(/\D/g, '');
            const nome = document.getElementById('nome').value;
            const tipo = document.getElementById('tipo').value;
            
            if (!cpf || !nome) {
                mostrarMensagem('❌ Preencha todos os campos!', 'error');
                return;
            }
            
            // Verificar se o usuário tem autorizações no sistema matriz
            const autorizacoesKey = `autorizacoes_usuario_${cpf}`;
            const autorizacoes = JSON.parse(localStorage.getItem(autorizacoesKey) || 'null');
            
            if (!autorizacoes || !autorizacoes.empresas_autorizadas || autorizacoes.empresas_autorizadas.length === 0) {
                mostrarMensagem('❌ Usuário não autorizado ou sem empresas cadastradas!', 'error');
                return;
            }
            
            const usuario = {
                cpf: cpf,
                nome: nome,
                tipo: tipo,
                dataLogin: new Date().toISOString()
            };
            
            sessionStorage.setItem('usuarioLogadoUnificado', JSON.stringify(usuario));
            window.location.href = 'app-unificado.html';
        }
        
        function mostrarMensagem(texto, tipo) {
            const div = document.getElementById('mensagem');
            div.innerHTML = `<div class="alert alert-${tipo}">${texto}</div>`;
            setTimeout(() => div.innerHTML = '', 3000);
        }
    </script>
</body>
</html>
